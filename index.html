<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lila Roginski — Marketing & Brand Creative</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f4f0e2;
    --cream2: #ede8d6;
    --dark: #1a1814;
    --dark2: #2a2620;
    --yellow: #d4c826;
    --yellow-hover: #b8ae1a;
    --text-muted: #6a6450;
    --border: #d8d2bc;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(244, 240, 226, 0.94);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 56px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--dark);
    text-decoration: none;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }
  .nav-links a {
    font-size: 14px;
    font-weight: 400;
    color: var(--dark2);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--yellow-hover); }

  /* SECTIONS */
  section { padding: 100px 0; }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 56px; }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 4.5vw, 56px);
    font-weight: 900;
    line-height: 1.05;
    color: var(--dark);
    margin-bottom: 48px;
  }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    padding: 7rem 3rem 4rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    position: relative;
    clip-path: inset(0 -600px 0 0);
    align-items: center;
    max-width: 1400px;
    margin: 0 auto;
  }
  .hero-blobs { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
  .blob { position: absolute; background: var(--yellow); border-radius: 50%; }
  .blob-tl { width: 500px; height: 500px; top: -200px; right: 5%; }
  .blob-bl { width: 420px; height: 420px; bottom: -180px; right: 28%; }
  .blob-tr { width: 280px; height: 280px; top: 45%; right: -60px; }

  .hero-photo {
    position: absolute;
    right: 22%; top: 50%;
    transform: translateY(-50%);
    width: 32vw; height: 32vw;
    max-width: 420px; max-height: 420px;
    min-width: 280px; min-height: 280px;
    border-radius: 50%;
    overflow: hidden; z-index: 2;
    background: #b5c4d8;
  }
  .hero-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }

  .hero-content { position: relative; z-index: 3; max-width: 520px; }
  .hero-eyebrow {
    font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 0.7s 0.1s forwards;
  }
  .hero-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.8rem, 5.5vw, 4.5rem);
    line-height: 1.05; letter-spacing: -0.02em; color: var(--dark);
    margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 0.7s 0.25s forwards;
  }
  .hero-title em { font-style: italic; color: var(--text-muted); }
  .hero-title .accent-word { position: relative; display: inline-block; }
  .hero-title .accent-word::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: 2px;
    height: 14px; background: var(--yellow); z-index: -1; transform: skewX(-3deg);
  }
  .hero-body {
    font-size: 1.05rem; line-height: 1.75; color: var(--text-muted);
    max-width: 440px; margin-bottom: 2.5rem;
    opacity: 0; animation: fadeUp 0.7s 0.4s forwards;
  }
  .hero-cta {
    display: inline-flex; align-items: center; gap: 0.75rem;
    background: var(--dark); color: var(--cream);
    padding: 1rem 2rem; border-radius: 60px;
    font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
    letter-spacing: 0.03em; text-decoration: none;
    transition: background 0.2s, transform 0.2s;
    opacity: 0; animation: fadeUp 0.7s 0.55s forwards;
  }
  .hero-cta:hover { background: var(--dark2); transform: translateY(-2px); }
  .hero-cta .arrow {
    width: 28px; height: 28px; background: var(--yellow); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
  }
  .hero-cta-secondary {
    display: inline-flex; align-items: center; gap: 0.75rem;
    background: var(--dark); color: var(--cream);
    padding: 1rem 2rem; border-radius: 60px;
    font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
    letter-spacing: 0.03em; text-decoration: none;
    border: none; cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    opacity: 0; animation: fadeUp 0.7s 0.65s forwards;
  }
  .hero-cta-secondary:hover { background: var(--dark2); transform: translateY(-2px); }
  .play-circle {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--yellow);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; line-height: 1; color: var(--dark);
  }
  .hero-ctas { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── ABOUT ── */
  #about { background: var(--dark); color: var(--cream); }
  #about .section-label { color: var(--yellow); }
  #about .section-title { color: var(--cream); }
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: start;
  }
  .about-bio {
    font-size: 17px;
    line-height: 1.8;
    font-weight: 300;
    color: rgba(244,240,226,0.8);
  }
  .about-bio p + p { margin-top: 16px; }
  .about-stats { display: flex; flex-direction: column; gap: 20px; }
  .stat-item {
    padding: 24px 28px;
    background: rgba(212,200,38,0.1);
    border-radius: 16px;
    border: 1px solid rgba(212,200,38,0.2);
  }
  .stat-number {
    font-family: 'DM Serif Display', serif;
    font-size: 46px;
    font-weight: 900;
    color: var(--yellow);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-desc { font-size: 13px; color: rgba(244,240,226,0.55); font-weight: 300; }

  /* ── VIDEO ── */
  #video { background: var(--cream2); }
  .video-wrapper {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 12px 48px rgba(26,24,20,0.1);
  }
  .video-wrapper iframe { position: absolute; top:0; left:0; width:100%; height:100%; }

  /* ── CARDS SHARED ── */
  .content-intro {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.75;
    max-width: 640px;
    margin-bottom: 48px;
    font-weight: 300;
  }
  .cards-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
  .two-col { grid-template-columns: repeat(2,1fr); }

  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-top: 3px solid var(--yellow);
    border-radius: 20px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 4px 20px rgba(26,24,20,0.07);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 40px rgba(26,24,20,0.14);
  }
  .card-type {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--dark);
    flex: 1;
  }
  .card-stats { display: flex; gap: 16px; flex-wrap: wrap; }
  .stat-chip-val {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--dark);
    line-height: 1;
  }
  .stat-chip-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--dark);
    text-decoration: none;
    border-bottom: 2px solid var(--yellow);
    padding-bottom: 1px;
    width: fit-content;
    transition: gap 0.2s;
  }
  .card-link:hover { gap: 10px; }

  /* ── WORK SECTIONS (Newsletters, LinkedIn, Events) ── */
  #newsletters, #linkedin, #events { background: var(--cream); border-top: 3px solid var(--yellow); }

  .events-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; }

  .event-featured {
    grid-column: 1 / -1;
    background: var(--yellow);
    border-radius: 20px;
    padding: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 32px;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    border: none;
  }
  .event-featured:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 48px rgba(26,24,20,0.2);
  }
  .event-featured-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--dark);
    margin-top: 8px;
  }
  .event-featured-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(26,24,20,0.55);
  }
  .event-feat-stats { display: flex; gap: 40px; flex-shrink: 0; }
  .event-feat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    font-weight: 900;
    color: var(--dark);
    line-height: 1;
  }
  .event-feat-lbl { font-size: 11px; color: rgba(26,24,20,0.55); text-transform: uppercase; letter-spacing: 0.08em; }

  /* ── EXPERIENCE ── */
  #experience { background: var(--cream); }
  .exp-list {
    border-left: 2px solid var(--border);
    padding-left: 36px;
    margin-left: 8px;
    display: flex;
    flex-direction: column;
  }
  .exp-item { position: relative; padding-bottom: 52px; }
  .exp-item:last-child { padding-bottom: 0; }
  .exp-dot {
    position: absolute;
    left: -45px; top: 8px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--yellow);
    border: 3px solid var(--cream);
    box-shadow: 0 0 0 2px var(--dark);
  }
  .exp-period { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .exp-role { font-family: 'DM Serif Display', serif; font-size: 28px; font-weight: 900; color: var(--dark); margin-bottom: 2px; }
  .exp-company { font-size: 14px; font-weight: 500; color: var(--text-muted); margin-bottom: 14px; }
  .exp-bullets { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .exp-bullets li {
    font-size: 14px; color: var(--text-muted); line-height: 1.65;
    padding-left: 16px; position: relative;
  }
  .exp-bullets li::before { content: '—'; position: absolute; left: 0; color: var(--yellow); }

  .edu-block {
    margin-top: 64px;
    background: var(--dark);
    border-radius: 20px;
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .edu-block .section-label { color: var(--yellow); }
  .edu-school { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 700; color: var(--cream); }
  .edu-detail { font-size: 13px; color: rgba(244,240,226,0.55); margin-top: 4px; }

  /* ── CONTACT ── */
  #contact { background: var(--yellow); }
  #contact .section-label { color: rgba(26,24,20,0.5); }
  #contact .section-title { color: var(--dark); }
  .contact-tagline { font-size: 17px; color: rgba(26,24,20,0.65); max-width: 460px; font-weight: 300; margin-bottom: 36px; }
  .contact-links { display: flex; gap: 12px; flex-wrap: wrap; }
  .contact-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s;
  }
  .contact-pill.dark { background: var(--dark); color: #fff; }
  .contact-pill.dark:hover { background: var(--dark2); }
  .contact-pill.outline { border: 2px solid var(--dark); color: var(--dark); }
  .contact-pill.outline:hover { background: var(--dark); color: #fff; }
  .contact-note { margin-top: 20px; font-size: 13px; color: rgba(26,24,20,0.45); }

  /* ── TWEAKS ── */
  #tweaks-panel {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: #fff; border: 1px solid var(--border); border-radius: 16px;
    padding: 20px 24px; width: 260px;
    box-shadow: 0 8px 32px rgba(26,24,20,0.15);
    display: none; flex-direction: column; gap: 16px;
    font-family: 'DM Sans', sans-serif;
  }
  #tweaks-panel.visible { display: flex; }
  .tweaks-title { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
  .tweak-row { display: flex; flex-direction: column; gap: 6px; }
  .tweak-label { font-size: 12px; color: var(--text-muted); }
  .tweak-swatch-row { display: flex; gap: 8px; }
  .tweak-swatch {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer; transition: border-color 0.15s;
  }
  .tweak-swatch.active { border-color: var(--dark); }

  @media (max-width: 768px) {
    nav { padding: 0 24px; }
    .nav-links { display: none; }
    .container { padding: 0 24px; }
    .hero { grid-template-columns: 1fr; padding-top: 8rem; }
    .hero-photo {
      position: relative; top: auto; right: auto; transform: none;
      width: 160px; height: 160px; min-width: 0; min-height: 0;
      margin: 0 auto 2rem auto;
    }
    .about-grid, .cards-grid, .events-grid { grid-template-columns: 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .event-featured { flex-direction: column; }
    .event-feat-stats { justify-content: center; }
  }
</style>
</head>
<body>
<img src="uploads/Lila_Roginski_photo.jpeg" alt="Lila Roginski" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const newsletters = [
  { subject: "Warming: Sweet Climate Week Pics Included!", sent: "998", opened: "65.1%", clicked: "2.51%", url: "https://eocampaign1.com/web-version?p=8015b190-29ee-11f0-8449-f5c623a97377&pt=campaign&t=1746485666&s=b90299e014521ed6ace4fecc6e3682e4e0922bcffce8f35af4630f79c4cbb72b" },
  { subject: "Why Hiring Managers Skip Your Portfolio: 2 Common Mistakes", sent: "1,165", opened: "49.7%", clicked: "1.37%", url: "https://eocampaign1.com/web-version?p=7e2423ba-8a9e-11f0-863a-71a7ef473c68&pt=campaign&t=1757117901&s=20a09dbd515fa8695192755865ccf4212bbb8c5b489610ddd3ac40b5e5301d44" },
  { subject: "Free Leadership Training!", sent: "674", opened: "64.1%", clicked: "5.93%", url: "https://eocampaign1.com/web-version?p=40620446-fa36-11ef-81d2-fb9a6fac7f9d&pt=campaign&t=1741387515&s=4ee06cd5db2a78f4935fe16cd6a64297e9323a842d88ef7a36646e9973a75512" }
];

const linkedinPosts = [
  { type: "Blog-style post", reactions: "135", comments: "30", impressions: null, url: "https://www.linkedin.com/feed/update/urn:li:activity:7307836031729311745/" },
  { type: "Partnered event promotion", reactions: "23", comments: "1", impressions: "1,097", url: "https://www.linkedin.com/posts/lila-roginski_the-sustainability-creatives-are-excited-activity-7348002884866756608-BbNs" },
  { type: "SF Climate Week promotion", reactions: "23", comments: "4", impressions: "881", url: "https://www.linkedin.com/posts/lila-roginski_laclimateweek-sfclimateweek-activity-7319152269101318144-MatF/" },
  { type: "Thought piece", reactions: "28", comments: "6", impressions: "1,086", url: "https://www.linkedin.com/posts/lila-roginski_welcome-to-the-hub-activity-7313991250997563392-kFnb/" }
];

const experience = [
  {
    company: "Sustainability Creatives", role: "Business Development Manager", period: "January 2024 – Present",
    bullets: ["Onboarded 150+ professionals to a climate career platform via multi-channel outreach", "Expanded email, LinkedIn, and calendar audiences by 10,000+ through tailored campaigns", "Facilitated ~100 virtual career workshops supporting 3,000+ job seekers", "Planned and executed multi-city 2025 Climate Week program in LA, SF, and NYC (~60 attendees/event)", "Led content strategy and copywriting across all outreach channels"]
  },
  {
    company: "Enviroslug", role: "Program Manager → Campaign Organizer", period: "September 2021 – July 2023",
    bullets: ["Supervised $350,000 budget; created quarterly budgets and cash flow forecasts", "Achieved 88% campus voter approval for the No Time to Waste Campaign", "Engaged ~100 students in a waste photo contest, resulting in 500+ petition signatures", "Recruited and trained 10 volunteers in public speaking, social media, and communications"]
  },
  {
    company: "Kids In Nature", role: "Teacher", period: "January 2020 – June 2023",
    bullets: ["Led after-school environmental education programs for ~30 K–5 students", "Designed interactive, storytelling-based lessons on complex environmental topics", "Offered behavioral support to neurodivergent students"]
  }
];

function Arrow() {
  return <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 2l5 5-5 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}
function DownArrow() {
  return <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7l5 5 5-5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}
function PlayIcon() {
  return <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 2.5l8 4.5-8 4.5V2.5z" fill="currentColor"/></svg>;
}

function StatChip({ val, label }) {
  return (
    <div>
      <div className="stat-chip-val">{val}</div>
      <div className="stat-chip-label">{label}</div>
    </div>
  );
}

function NewsletterCard({ d }) {
  return (
    <div className="card">
      <span className="card-type">Newsletter</span>
      <p className="card-title">"{d.subject}"</p>
      <div className="card-stats">
        <StatChip val={d.sent} label="Sent" />
        <StatChip val={d.opened} label="Opened" />
        <StatChip val={d.clicked} label="Clicked" />
      </div>
      <a href={d.url} target="_blank" rel="noopener" className="card-link">Read issue <Arrow /></a>
    </div>
  );
}

function LinkedInCard({ d }) {
  return (
    <div className="card">
      <span className="card-type">LinkedIn</span>
      <p className="card-title">{d.type}</p>
      <div className="card-stats">
        <StatChip val={d.reactions} label="Reactions" />
        <StatChip val={d.comments} label="Comments" />
        {d.impressions && <StatChip val={d.impressions} label="Impressions" />}
      </div>
      <a href={d.url} target="_blank" rel="noopener" className="card-link">View post <Arrow /></a>
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "yellow"
}/*EDITMODE-END*/;

function App() {
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [accent, setAccent] = useState(TWEAK_DEFAULTS.accentColor);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const applyAccent = (name) => {
    setAccent(name);
    const map = {
      yellow: { '--yellow': '#d4c826', '--yellow-hover': '#b8ae1a' },
      sage:   { '--yellow': '#7aaa82', '--yellow-hover': '#5e8e66' },
      clay:   { '--yellow': '#d4845a', '--yellow-hover': '#b8673d' },
    };
    Object.entries(map[name]).forEach(([k,v]) => document.documentElement.style.setProperty(k, v));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: name } }, '*');
  };

  return (

            <span className="accent-word">matters most</span>

            </a>

              <p>I hold a B.A. in Environmental Studies from UC Santa Cruz (Magna cum laude) and continue expanding my toolkit with coursework in data science, sustainability reporting, and business.</p>
            </div>
            <div className="about-stats">

      </section>

      {/* CONTACT */}

      {/* TWEAKS */}
